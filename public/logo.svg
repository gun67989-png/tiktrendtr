  <path d="M430 78 L440 130" stroke="#FF3B5C" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M430 78 L378 95" stroke="#FF3B5C" stroke-width="22" stroke-linecap="round" fill="none"/>
