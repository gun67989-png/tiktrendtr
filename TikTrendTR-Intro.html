<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTrendTR - 3D Intro Animation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c14;color:#f0f0f8;font-family:Inter,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;perspective:1200px}
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;opacity:0;animation:orbIn 1s ease-out forwards}
.orb-r{top:20%;left:25%;width:380px;height:380px;background:rgba(255,77,106,.10);animation:orbIn 1s forwards,oF1 5s ease-in-out infinite}
.orb-t{bottom:20%;right:25%;width:320px;height:320px;background:rgba(0,230,184,.08);animation:orbIn 1s forwards,oF2 6s ease-in-out infinite}
.orb-p{top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;background:rgba(167,139,250,.06);filter:blur(140px);animation:orbIn 1s forwards,oP 7s ease-in-out infinite}
@keyframes orbIn{to{opacity:1}}
@keyframes oF1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-30px) scale(1.3)}50%{transform:translate(-30px,20px) scale(.85)}75%{transform:translate(20px,15px) scale(1.1)}}
@keyframes oF2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-35px,25px) scale(.85)}66%{transform:translate(25px,-20px) scale(1.2)}}
@keyframes oP{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}
.sh{position:fixed;border:1px solid;pointer-events:none;opacity:0}
.s1{top:12%;left:8%;width:20px;height:20px;border-color:rgba(255,77,106,.2);border-radius:3px;animation:sI .6s .3s forwards,sR1 4s linear infinite,sFL 3s ease-in-out infinite}
.s2{top:18%;right:12%;width:28px;height:28px;border-color:rgba(0,230,184,.2);border-radius:50%;animation:sI .6s .5s forwards,sR2 5s linear infinite,sFL2 4s ease-in-out infinite}
.s3{bottom:22%;left:15%;width:16px;height:16px;border-color:rgba(167,139,250,.2);animation:sI .6s .7s forwards,sR1 6s linear infinite,sFL 3.5s ease-in-out infinite}
.s4{bottom:15%;right:10%;width:24px;height:24px;border-color:rgba(251,191,36,.2);border-radius:3px;animation:sI .6s .9s forwards,sR2 4.5s linear infinite,sFL2 2.8s ease-in-out infinite}
.s5{top:40%;left:5%;width:18px;height:18px;border-color:rgba(255,77,106,.15);border-radius:50%;animation:sI .6s .4s forwards,sR1 5.5s linear infinite,sFL 4.2s ease-in-out infinite}
.s6{top:35%;right:7%;width:22px;height:22px;border-color:rgba(0,230,184,.15);animation:sI .6s .6s forwards,sR2 7s linear infinite,sFL2 3.2s ease-in-out infinite}
@keyframes sI{to{opacity:1}}
@keyframes sR1{to{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes sR2{to{transform:rotateX(-360deg) rotateY(360deg)}}
@keyframes sFL{0%,100%{translate:0 0}50%{translate:0 -15px}}
@keyframes sFL2{0%,100%{translate:0 0}50%{translate:0 12px}}
.scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;transform-style:preserve-3d;opacity:0;animation:scIn 1s cubic-bezier(.22,1,.36,1) .1s forwards}
@keyframes scIn{from{opacity:0;transform:rotateX(25deg) rotateY(-15deg) scale(.7)}to{opacity:1;transform:rotateX(0) rotateY(0) scale(1)}}
.lw{position:relative;margin-bottom:32px;perspective:600px;transform-style:preserve-3d}
.or{position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid;transform-style:preserve-3d;pointer-events:none}
.o1{width:112px;height:112px;margin:-56px 0 0 -56px;border-color:rgba(255,77,106,.25);transform:rotateX(70deg);animation:os1 4s linear infinite}
.o2{width:144px;height:144px;margin:-72px 0 0 -72px;border-color:rgba(0,230,184,.20);transform:rotateX(55deg) rotateZ(30deg);animation:os2 5s linear infinite}
.o3{width:128px;height:128px;margin:-64px 0 0 -64px;border-color:rgba(167,139,250,.15);transform:rotateX(60deg) rotateZ(-40deg);animation:os3 6s linear infinite}
@keyframes os1{to{transform:rotateX(70deg) rotateY(360deg)}}
@keyframes os2{to{transform:rotateX(55deg) rotateZ(30deg) rotateY(-360deg)}}
@keyframes os3{to{transform:rotateX(60deg) rotateZ(-40deg) rotateY(360deg)}}
.pr{position:absolute;inset:0;border-radius:16px;border:1px solid rgba(255,77,106,.2);opacity:0}
.pr:nth-child(4){animation:pE 2.5s .5s ease-out infinite}
.pr:nth-child(5){animation:pE 2.5s 1s ease-out infinite}
.pr:nth-child(6){animation:pE 2.5s 1.5s ease-out infinite}
@keyframes pE{0%{opacity:.4;transform:scale(.7)}100%{opacity:0;transform:scale(2.5)}}
.po{position:absolute;top:50%;left:50%;transform-style:preserve-3d;opacity:0;animation:poI .6s var(--d) forwards,poS var(--sp) linear infinite}
@keyframes poI{to{opacity:.8}}
@keyframes poS{to{rotate:360deg}}
.pd{width:var(--sz);height:var(--sz);border-radius:50%;background:var(--cl);box-shadow:0 0 6px var(--cl);transform:translateX(var(--r))}
.li{position:relative;width:72px;height:72px;border-radius:16px;background:linear-gradient(135deg,#ff4d6a,#d93a56);display:flex;align-items:center;justify-content:center;transform-style:preserve-3d;box-shadow:0 0 30px rgba(255,77,106,.3),0 20px 40px rgba(0,0,0,.3);opacity:0;animation:lIn .8s cubic-bezier(.175,.885,.32,1.275) .15s forwards}
.li::after{content:"";position:absolute;inset:0;border-radius:16px;background:rgba(255,255,255,.1)}
@keyframes lIn{0%{opacity:0;transform:scale(0) rotateY(-180deg) rotateX(45deg)}100%{opacity:1;transform:scale(1) rotateY(0) rotateX(0)}}
.li svg{width:36px;height:36px;color:#fff;position:relative;z-index:2;animation:iSp 3s cubic-bezier(.22,1,.36,1) .8s}
@keyframes iSp{0%,30%{transform:rotateY(0)}70%,100%{transform:rotateY(360deg)}}
.br{display:flex;align-items:center;margin-bottom:8px;perspective:800px}
.br span{display:inline-block;font-size:2.25rem;font-weight:800;transform-style:preserve-3d;transform-origin:bottom center;opacity:0;animation:ltI .5s cubic-bezier(.22,1,.36,1) forwards;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.br .ac{color:#ff4d6a;text-shadow:0 0 20px rgba(255,77,106,.4)}
@keyframes ltI{from{opacity:0;transform:rotateY(-90deg) rotateX(30deg) translateZ(-80px) translateY(20px)}to{opacity:1;transform:rotateY(0) rotateX(0) translateZ(0) translateY(0)}}
.dv{width:96px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,rgba(255,77,106,.6),rgba(0,230,184,.4),transparent);box-shadow:0 0 8px rgba(255,77,106,.3),0 0 8px rgba(0,230,184,.2);margin-bottom:16px;transform:scaleX(0) rotateX(90deg);animation:dvI .7s cubic-bezier(.22,1,.36,1) 1.05s forwards}
@keyframes dvI{to{transform:scaleX(1) rotateX(0)}}
.wt{font-size:1rem;color:#9494b0;text-align:center;letter-spacing:.05em;text-shadow:0 1px 8px rgba(0,0,0,.2);opacity:0;transform-origin:top center;animation:wtI .6s ease-out 1.2s forwards}
@keyframes wtI{from{opacity:0;transform:rotateX(-40deg) translateY(15px);filter:blur(12px)}to{opacity:1;transform:rotateX(0) translateY(0);filter:blur(0)}}
.sw{margin-top:28px;width:160px;height:3px;background:rgba(28,28,43,.5);border-radius:3px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.2);opacity:0;transform-origin:bottom center;animation:bI .5s ease-out 1.5s forwards}
@keyframes bI{from{opacity:0;transform:rotateX(60deg)}to{opacity:1;transform:rotateX(0)}}
.sb{width:25%;height:100%;border-radius:3px;background:linear-gradient(90deg,transparent,rgba(255,77,106,.8),rgba(0,230,184,.6),rgba(167,139,250,.5),transparent);animation:shM 1.2s ease-in-out 1.5s infinite;transform:translateX(-100%)}
@keyframes shM{0%{transform:translateX(-100%)}100%{transform:translateX(500%)}}
.rb{position:fixed;bottom:24px;right:24px;z-index:100;background:rgba(19,19,30,.9);border:1px solid rgba(46,46,68,.5);color:#9494b0;padding:10px 20px;border-radius:10px;font-family:Inter,sans-serif;font-size:13px;cursor:pointer;backdrop-filter:blur(12px);transition:all .2s}
.rb:hover{color:#f0f0f8;border-color:rgba(255,77,106,.3);box-shadow:0 0 16px rgba(255,77,106,.1)}
</style>
</head>
<body>
<div class="orb orb-r"></div><div class="orb orb-t"></div><div class="orb orb-p"></div>
<div class="sh s1"></div><div class="sh s2"></div><div class="sh s3"></div><div class="sh s4"></div><div class="sh s5"></div><div class="sh s6"></div>
<div class="scene" id="sc">
<div class="lw">
<div class="or o1"></div><div class="or o2"></div><div class="or o3"></div>
<div class="pr"></div><div class="pr"></div><div class="pr"></div>
<div class="po" style="--sp:6s;--d:.5s"><div class="pd" style="--sz:4px;--cl:rgba(255,77,106,.6);--r:90px"></div></div>
<div class="po" style="--sp:8s;--d:.7s"><div class="pd" style="--sz:3px;--cl:rgba(0,230,184,.5);--r:110px"></div></div>
<div class="po" style="--sp:7s;--d:.6s"><div class="pd" style="--sz:5px;--cl:rgba(167,139,250,.5);--r:95px"></div></div>
<div class="po" style="--sp:10s;--d:.4s"><div class="pd" style="--sz:3px;--cl:rgba(255,77,106,.5);--r:120px"></div></div>
<div class="po" style="--sp:9s;--d:.8s"><div class="pd" style="--sz:4px;--cl:rgba(0,230,184,.4);--r:100px"></div></div>
<div class="po" style="--sp:6.5s;--d:.3s"><div class="pd" style="--sz:3px;--cl:rgba(251,191,36,.4);--r:85px"></div></div>
<div class="po" style="--sp:8.5s;--d:.9s"><div class="pd" style="--sz:4px;--cl:rgba(167,139,250,.4);--r:115px"></div></div>
<div class="po" style="--sp:7.5s;--d:.5s"><div class="pd" style="--sz:5px;--cl:rgba(255,77,106,.4);--r:105px"></div></div>
<div class="li"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg></div>
</div>
<div class="br" id="br"></div>
<div class="dv"></div>
<p class="wt">TikTok Trend Analiz Platformu</p>
<div class="sw"><div class="sb"></div></div>
</div>
<button class="rb" onclick="replay()">Tekrar Oynat</button>
<script>
var bt=[{c:"T"},{c:"i"},{c:"k"},{c:"T"},{c:"r"},{c:"e"},{c:"n"},{c:"d"},{c:"T",a:1},{c:"R",a:1}];
function buildBrand(){var b=document.getElementById("br");b.innerHTML="";bt.forEach(function(m,i){var s=document.createElement("span");s.textContent=m.c;if(m.a)s.className="ac";s.style.animationDelay=(0.5+i*0.06)+"s";b.appendChild(s)})}
function replay(){document.body.innerHTML=document.body.innerHTML;buildBrand()}
buildBrand();
</script>
</body>
</html>
